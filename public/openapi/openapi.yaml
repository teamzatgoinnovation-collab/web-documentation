components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sid
      description: Frappe session cookie (plus CSRF header when required)
    apiToken:
      type: http
      scheme: token
      description: 'Authorization: token <api_key>:<api_secret>'
  schemas:
    ApiEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        data: {}
        meta:
          type: object
          additionalProperties: true
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
        request_id:
          type: string
    FrappeMessage:
      type: object
      description: Frappe wraps return values as { message: <ApiEnvelope|payload> }
      properties:
        message:
          oneOf:
            - $ref: '#/components/schemas/ApiEnvelope'
            - {}
